<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDevTeam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #2e2e2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    #model-select {
      margin-left: auto;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      width: fit-content;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.agent {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.agent .tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      opacity: 0.5;
    }

    .msg.agent code {
      background: #1a1a1a;
      padding: 8px 12px;
      border-radius: 6px;
      display: block;
      margin-top: 8px;
      font-family: "SF Mono", monospace;
      font-size: 13px;
    }

    .confirm-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .confirm-buttons button {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .btn-run { background: #16a34a; color: #fff; }
    .btn-cancel { background: #3a3a3a; color: #e0e0e0; }

    .msg.error { background: #3f1515; border-color: #7f1d1d; color: #fca5a5; }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #2e2e2e;
      display: flex;
      gap: 10px;
    }

    #prompt {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
    }

    #prompt:focus { border-color: #2563eb; }

    #send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #555;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>MyDevTeam</h1>
  <select id="model-select">
    <option value="qwen3:8b-q4_K_M">qwen3:8b-q4_K_M</option>
    <option value="qwen3:8b">qwen3:8b</option>
    <option value="qwen3:4b">qwen3:4b</option>
    <option value="hermes3:8b">hermes3:8b</option>
    <option value="qwen2.5-coder:14b">qwen2.5-coder:14b</option>
    <option value="qwen2.5:7b">qwen2.5:7b</option>
    <option value="qwen2.5:32b">qwen2.5:32b</option>
    <option value="gemma3:12b">gemma3:12b</option>
    <option value="qwen2.5:3b">qwen2.5:3b</option>
  </select>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="prompt" rows="1" placeholder="Ask the agent anything…"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
  window.DEFAULT_MODEL = "__DEFAULT_MODEL__";
  const messagesEl = document.getElementById("messages");
  const promptEl = document.getElementById("prompt");
  const sendBtn = document.getElementById("send-btn");
  const modelSelect = document.getElementById("model-select");

  if ([...modelSelect.options].some((option) => option.value === window.DEFAULT_MODEL)) {
    modelSelect.value = window.DEFAULT_MODEL;
  }

  function addMessage(role, content, type = null, pendingCommand = null) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;

    if (role === "agent") {
      const tag = document.createElement("div");
      tag.className = "tag";
      tag.textContent = type || "agent";
      div.appendChild(tag);
    }

    const text = document.createElement("span");
    text.textContent = content;
    div.appendChild(text);

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addThinking() {
    const div = document.createElement("div");
    div.className = "msg agent";
    div.innerHTML = `<span class="spinner"></span><span>Thinking…</span>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage(prompt, confirm = false) {
    sendBtn.disabled = true;
    const thinking = addThinking();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, model: modelSelect.value, confirm }),
      });

      const text = await res.text();
      thinking.remove();

      let actions;
      try {
        actions = JSON.parse(text);
      } catch {
        addMessage("agent", `Server error: ${text}`, null);
        messagesEl.lastChild.classList.add("error");
        sendBtn.disabled = false;
        return;
      }

      const skip = new Set(["summary", "note", "remember"]);
      for (const action of actions) {
        if (skip.has(action.type)) continue;
        if (action.type === "confirm") {
          addConfirm(action.content, action.pending_confirm, prompt);
        } else {
          addMessage("agent", action.content, action.type);
        }
      }
    } catch (err) {
      thinking.remove();
      addMessage("agent", `Error: ${err.message}`, null);
      messagesEl.lastChild.classList.add("error");
    }

    sendBtn.disabled = false;
    promptEl.focus();
  }

  function addConfirm(question, pendingConfirm, originalPrompt) {
    const div = document.createElement("div");
    div.className = "msg agent";

    const tag = document.createElement("div");
    tag.className = "tag";
    tag.textContent = "confirm";
    div.appendChild(tag);

    const text = document.createElement("span");
    text.textContent = question;
    div.appendChild(text);

    const btns = document.createElement("div");
    btns.className = "confirm-buttons";

    const runBtn = document.createElement("button");
    runBtn.className = "btn-run";
    runBtn.textContent = "Confirm";
    runBtn.onclick = () => {
      btns.remove();
      addMessage("user", "Confirmed");
      sendMessage(originalPrompt, true);
    };

    const cancelBtn = document.createElement("button");
    cancelBtn.className = "btn-cancel";
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = () => btns.remove();

    btns.appendChild(runBtn);
    btns.appendChild(cancelBtn);
    div.appendChild(btns);

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function submit() {
    const prompt = promptEl.value.trim();
    if (!prompt) return;
    promptEl.value = "";
    promptEl.style.height = "auto";
    addMessage("user", prompt);
    sendMessage(prompt);
  }

  sendBtn.addEventListener("click", submit);

  promptEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  });

  promptEl.addEventListener("input", () => {
    promptEl.style.height = "auto";
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + "px";
  });
</script>
</body>
</html>
