services:
  redis:
    image: redis:7-alpine
    container_name: mydevteam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  sandbox:
    image: alpine:latest
    container_name: mydevteam-sandbox
    command: sleep infinity
    restart: unless-stopped
    network_mode: none
    mem_limit: 256m
    cpus: 0.5
    working_dir: /workspace
    volumes:
      - sandbox-data:/workspace

volumes:
  sandbox-data:
  redis-data:
